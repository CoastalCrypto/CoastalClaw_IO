name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @coastal-claw/core exec playwright install chromium --with-deps
      - run: pnpm build
      - run: pnpm test

  smoke:
    name: Docker smoke test
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/smoke-test-docker.sh
