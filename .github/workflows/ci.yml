name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # node-portaudio is an optional dep that requires PortAudio headers
      - run: sudo apt-get install -y portaudio19-dev

      # Use --no-frozen-lockfile so the optional native dep (node-portaudio)
      # can be resolved on this runner without failing the specifier check.
      # Developers should run `pnpm install` on Linux/WSL after adding native
      # optional deps to keep pnpm-lock.yaml in sync.
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm exec playwright install --with-deps
      - run: pnpm build
      - run: pnpm test

  smoke:
    name: Docker smoke test
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/smoke-test-docker.sh
