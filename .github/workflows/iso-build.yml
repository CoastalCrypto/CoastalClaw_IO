name: CoastalOS ISO Build

on:
  push:
    branches: [master]
    paths:
      - 'coastalos/**'
      - '.github/workflows/iso-build.yml'
  workflow_dispatch:
    inputs:
      version:
        description: "ISO version (e.g. 1.0.0)"
        required: false
        default: "ci"
      attach_release:
        description: "Attach to GitHub Release with this tag (e.g. v1.0.0) — leave blank to skip"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install live-build and QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            live-build qemu-system-x86 ovmf curl syslinux-utils

      - name: Build ISO
        env:
          VERSION: ${{ github.event.inputs.version || 'ci' }}
        run: |
          sudo bash coastalos/build/build.sh "$VERSION"
          ls -lh coastalos-*.iso

      - name: QEMU smoke test
        run: |
          ISO=$(ls coastalos-*.iso | head -1)
          bash coastalos/build/test/smoke-test.sh "$ISO"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: coastalos-${{ github.event.inputs.version || 'ci' }}-${{ github.run_number }}.iso
          path: coastalos-*.iso
          retention-days: 30
          if-no-files-found: error

      - name: Attach ISO to GitHub Release
        if: ${{ github.event.inputs.attach_release != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISO=$(ls coastalos-*.iso | head -1)
          gh release upload "${{ github.event.inputs.attach_release }}" "$ISO" \
            --repo "${{ github.repository }}" \
            --clobber
          echo "Attached $ISO to release ${{ github.event.inputs.attach_release }}"
