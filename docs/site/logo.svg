<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <!-- Deep ocean gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <!-- Wave body gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#0094c8;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#004e70;stop-opacity:0.5"/>
    </linearGradient>
    <!-- Claw glow gradient -->
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0094c8"/>
    </linearGradient>
    <!-- Neural node glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:0"/>
    </radialGradient>
    <!-- Glow filter for claw -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow for wave crest -->
    <filter id="waveGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="logoClip">
      <rect width="160" height="160" rx="20"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════ -->
  <!--  LOGO MARK  (left square icon)             -->
  <!-- ═══════════════════════════════════════════ -->
  <g clip-path="url(#logoClip)">
    <!-- Background -->
    <rect width="160" height="160" rx="20" fill="url(#bgGrad)"/>

    <!-- Subtle circuit grid -->
    <g stroke="#0d4f6b" stroke-width="0.4" opacity="0.3">
      <line x1="0" y1="40" x2="160" y2="40"/>
      <line x1="0" y1="80" x2="160" y2="80"/>
      <line x1="0" y1="120" x2="160" y2="120"/>
      <line x1="40" y1="0" x2="40" y2="160"/>
      <line x1="80" y1="0" x2="80" y2="160"/>
      <line x1="120" y1="0" x2="120" y2="160"/>
    </g>

    <!-- Ocean wave — three overlapping layers -->
    <!-- Bottom layer (darkest) -->
    <path d="M-10 105 Q20 90 50 100 Q80 110 110 95 Q140 80 170 92 L170 160 L-10 160 Z"
          fill="#004e70" opacity="0.6"/>
    <!-- Mid layer -->
    <path d="M-10 112 Q25 96 55 108 Q85 120 115 104 Q145 88 170 100 L170 160 L-10 160 Z"
          fill="#0d6a8a" opacity="0.7"/>
    <!-- Top rolling wave with crest glow -->
    <path d="M-10 118 Q15 100 45 114 Q75 128 105 112 Q135 96 170 108 L170 160 L-10 160 Z"
          fill="url(#waveGrad)" filter="url(#waveGlow)"/>

    <!-- Foam crest particles -->
    <g fill="#00e5ff" opacity="0.8">
      <circle cx="45" cy="113" r="2.5"/>
      <circle cx="52" cy="110" r="1.5"/>
      <circle cx="38" cy="116" r="1.8"/>
      <circle cx="105" cy="111" r="2.2"/>
      <circle cx="112" cy="108" r="1.4"/>
      <circle cx="98" cy="114" r="1.7"/>
    </g>

    <!-- ── CLAW MARK ── centred in upper portion -->
    <g transform="translate(80, 68)" filter="url(#glow)">
      <!-- Main claw arm left -->
      <path d="M0 0 C-12 -8 -22 -20 -18 -36 C-14 -50 -2 -52 4 -44 C8 -38 6 -28 0 -22"
            stroke="url(#clawGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <!-- Main claw arm right -->
      <path d="M0 0 C12 -8 22 -20 18 -36 C14 -50 2 -52 -4 -44 C-8 -38 -6 -28 0 -22"
            stroke="url(#clawGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <!-- Claw spine -->
      <path d="M0 0 L0 18" stroke="url(#clawGrad)" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Left pincer tip -->
      <path d="M-18 -36 C-24 -42 -20 -50 -14 -48"
            stroke="#00ffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Right pincer tip -->
      <path d="M18 -36 C24 -42 20 -50 14 -48"
            stroke="#00ffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Neural nodes at joints -->
      <circle cx="-18" cy="-36" r="4" fill="url(#nodeGlow)" opacity="0.9"/>
      <circle cx="18" cy="-36" r="4" fill="url(#nodeGlow)" opacity="0.9"/>
      <circle cx="0" cy="0" r="5" fill="url(#nodeGlow)"/>
      <!-- Node inner cores -->
      <circle cx="-18" cy="-36" r="2" fill="#00ffff"/>
      <circle cx="18" cy="-36" r="2" fill="#00ffff"/>
      <circle cx="0" cy="0" r="2.5" fill="#00ffff"/>
      <!-- Neural edges connecting nodes -->
      <line x1="-10" y1="-22" x2="-18" y2="-36" stroke="#00b4d8" stroke-width="1" opacity="0.5"/>
      <line x1="10" y1="-22" x2="18" y2="-36" stroke="#00b4d8" stroke-width="1" opacity="0.5"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!--  WORDMARK  (right side)                    -->
  <!-- ═══════════════════════════════════════════ -->
  <!-- COASTAL -->
  <text x="180" y="75"
        font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="34" font-weight="700" letter-spacing="4"
        fill="#e8f6fb">COASTAL</text>

  <!-- CLAW — cyan accent -->
  <text x="180" y="115"
        font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="34" font-weight="800" letter-spacing="4"
        fill="#00e5ff">CLAW</text>

  <!-- Tagline -->
  <text x="182" y="138"
        font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="400" letter-spacing="3"
        fill="#4da8c8" opacity="0.85">PRIVATE AI · ON YOUR HARDWARE</text>

  <!-- Decorative accent line under wordmark -->
  <line x1="180" y1="122" x2="490" y2="122" stroke="#00b4d8" stroke-width="1" opacity="0.3"/>
</svg>
